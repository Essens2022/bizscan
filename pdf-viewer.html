<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Report PDF | BizScan</title><link rel="icon" href="favicon.png">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:#0b1119;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.pdf-bar{position:fixed;top:0;left:0;right:0;height:56px;background:#0d131d;border-bottom:1px solid #232f42;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.pdf-back{display:flex;align-items:center;gap:8px;color:#f5f7fb;text-decoration:none;font-weight:800;font-size:14px;padding:8px 14px;border-radius:10px;background:linear-gradient(135deg,#ffb400,#ff8a00);color:#0c1420}
.pdf-title{color:#8f9bad;font-size:12px;max-width:45vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdf-frame-wrap{position:fixed;top:56px;left:0;right:0;bottom:0}
.pdf-frame-wrap iframe{width:100%;height:100%;border:0;background:#fff}
.pdf-fallback{position:fixed;top:56px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;text-align:center;color:#c7d0dd}
.pdf-fallback a{background:linear-gradient(135deg,#ffb400,#ff8a00);color:#0c1420;font-weight:800;padding:12px 22px;border-radius:12px;text-decoration:none}
</style>
</head><body>
<div class="pdf-bar">
  <a class="pdf-back" id="backBtn" href="index.html">← Torna a BizScan</a>
  <span class="pdf-title" id="pdfTitleLabel"></span>
</div>
<div class="pdf-frame-wrap">
  <iframe id="pdfFrame" title="Report PDF BizScan"></iframe>
</div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  var pdfUrl=params.get('url');
  var slug=params.get('slug');
  var title=params.get('title');
  var backBtn=document.getElementById('backBtn');
  if(slug){
    backBtn.href='analysis.html?slug='+encodeURIComponent(slug);
    backBtn.textContent='← Torna al prodotto';
  }
  if(title)document.getElementById('pdfTitleLabel').textContent=title;
  if(pdfUrl){
    document.getElementById('pdfFrame').src=pdfUrl;
    document.title=(title?title+' - ':'')+'Report PDF | BizScan';
  }else{
    document.querySelector('.pdf-frame-wrap').outerHTML='<div class="pdf-fallback"><p>Nessun report da mostrare.</p><a href="index.html">Torna a BizScan</a></div>';
  }
})();
</script>
</body></html>
