<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BizScan Pro</title><link rel="stylesheet" href="styles.css"></head><body><div class="app">
<header class="topbar">
  <a class="brand" href="index.html">
    <img src="assets/bizscan-logo.png" alt="BizScan">
    <span>Biz<b>Scan</b></span>
  </a>
  <div class="top-actions">
    <button class="icon-btn" onclick="location.href='library.html'">▤</button>
    <button class="icon-btn" onclick="openPlan('menu')">☰</button>
  </div>
</header>

<section class="hero">
  <div class="kicker">RISCHIO PROFITTO INVESTIMENTO</div>
  <h1>Capisci subito <span>quanto rischi</span></h1>
  <p>Ogni attività mostra rischio opportunità investimento e tempo di rientro prima ancora di aprire l analisi</p>
  <div class="search"><input id="searchInput" placeholder="Pizzeria McDonald’s autolavaggio bar"><button onclick="searchBusiness()">⌕</button></div>
</section>
<div class="smartbar">
  <button class="smartchip active" onclick="location.href='search.html'">Tutte</button>
  <button class="smartchip" onclick="location.href='search.html?risk=low'">Meno rischiose</button>
  <button class="smartchip" onclick="location.href='search.html?sort=opportunity'">Più opportunità</button>
  <button class="smartchip" onclick="location.href='pricing.html'">Piani</button>
</div>

<section class="section">
  <div class="section-head"><h2>Analisi disponibili</h2><a href="pricing.html">Prezzi</a></div>
  <div class="tools">
    <select id="riskFilter" onchange="renderCards()">
      <option value="all">Tutti i rischi</option>
      <option value="low">Rischio basso</option>
      <option value="medium">Rischio medio</option>
      <option value="high">Rischio alto</option>
    </select>
    <select id="sortFilter" onchange="renderCards()">
      <option value="recommended">Consigliate</option>
      <option value="risk">Meno rischiose</option>
      <option value="opportunity">Più opportunità</option>
      <option value="investment">Investimento più basso</option>
    </select>
  </div>
  <div class="grid" id="cardsHost"></div>
</section>

</div>
<nav class="bottom-nav">
  <a href="index.html"><span>⌂</span><span>Home</span></a>
  <a href="search.html"><span>⌕</span><span>Cerca</span></a>
  <a href="pricing.html"><span>★</span><span>Prezzi</span></a>
  <a href="library.html"><span>▤</span><span>Libreria</span></a>
  <a href="account.html"><span>♙</span><span>Profilo</span></a>
</nav>
<div class="compare-bar" id="compareBar">
  <div><strong id="compareCount">0 su 2 scelte</strong><small>Confronta due attività</small></div>
  <button id="compareBtn" disabled onclick="openCompare()">Confronta</button>
</div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card"><div class="handle"></div><div id="modalContent"></div></div>
</div>
<script src="app.js"></script></body></html>
